server:
  port: 8081

spring:
  application:
    name: exam-system

  # H2 本地文件数据库（持久化存储，AUTO_SERVER=TRUE 解决文件锁冲突）
  datasource:
    url: jdbc:h2:file:./db/examdb;DB_CLOSE_DELAY=-1;LOCK_TIMEOUT=5000;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      connection-timeout: 10000
      maximum-pool-size: 10

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # H2 控制台 (开发调试用)
  h2:
    console:
      enabled: true
      path: /h2-console

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

app:
  ai:
    base-url: ${AI_BASE_URL:}
    api-key: ${AI_API_KEY:}
    model: ${AI_MODEL:gpt-5.5}
    timeout: ${AI_TIMEOUT:30000}
  cors:
    # 逗号分隔的跨域白名单（支持通配符，如 http://*:*）
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3001,http://127.0.0.1:3001,http://67.215.236.189:3001}
