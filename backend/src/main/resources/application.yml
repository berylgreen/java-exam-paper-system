server:
  port: 8080

spring:
  application:
    name: exam-system

app:
  ai:
    base-url: ${AI_BASE_URL:http://localhost:1879/v1}
    api-key: ${AI_API_KEY:agt_codex_DK24HZklsPBHgYpSf8ZWoqgyCEmPaaJr}
    model: ${AI_MODEL:gpt-5.4}
    timeout: ${AI_TIMEOUT:30000}

  # H2 本地文件数据库（持久化存储，AUTO_SERVER=TRUE 解决文件锁冲突）
  datasource:
    url: jdbc:h2:file:./db/examdb;DB_CLOSE_DELAY=-1;LOCK_TIMEOUT=5000;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      connection-timeout: 10000
      maximum-pool-size: 10

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # H2 控制台 (开发调试用)
  h2:
    console:
      enabled: true
      path: /h2-console

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
