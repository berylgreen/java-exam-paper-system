server:
  port: 8080

spring:
  application:
    name: exam-system

  # H2 内存数据库（避免文件锁问题）
  datasource:
    url: jdbc:h2:mem:examdb;DB_CLOSE_DELAY=-1;LOCK_TIMEOUT=5000
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      connection-timeout: 10000
      maximum-pool-size: 10

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # H2 控制台 (开发调试用)
  h2:
    console:
      enabled: true
      path: /h2-console

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
